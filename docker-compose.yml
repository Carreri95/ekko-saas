# Postgres para desenvolvimento local. Na raiz: docker compose up -d
# Depois: .env com DATABASE_URL e npm run db:migrate (migrations em apps/api — ver monorepo-operacao.md)
services:
  postgres:
    image: postgres:16
    container_name: subtitle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subtitle_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
