# Postgres para desenvolvimento local. Na raiz: docker compose up -d
# Depois em web/: copiar .env.example para .env e npm run db:migrate
services:
  postgres:
    image: postgres:16
    container_name: subtitle_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subtitle_studio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
