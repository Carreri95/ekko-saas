<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de SRT — Mockup (referência visual)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 13px;
    background: #1a1a1a;
    color: #e0e0e0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }
  .app-wrap { position: relative; width: 100%; max-width: 1100px; }
  .app {
    display: flex;
    flex-direction: column;
    height: 640px;
    background: #1e1e1e;
    border-radius: 10px;
    overflow: hidden;
    border: 0.5px solid #333;
  }
  .toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #252525;
    border-bottom: 0.5px solid #333;
    flex-shrink: 0;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 6px;
    border: 0.5px solid #444;
    background: #2e2e2e;
    color: #e0e0e0;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
  }
  .btn-primary { background: #1D9E75; border-color: #0F6E56; color: #fff; }
  .toolbar-sep { width: 0.5px; height: 20px; background: #444; margin: 0 4px; }
  .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .count-label { font-size: 11px; color: #888; }
  .zip-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 6px;
    border: 0.5px solid #0F6E56;
    background: #0d3d2a;
    color: #5DCAA5;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
  }
  .zip-btn.disabled { opacity: 0.4; pointer-events: none; }
  .table-wrap { flex: 1; overflow: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 7px 12px;
    font-size: 11px;
    font-weight: 500;
    color: #888;
    background: #252525;
    border-bottom: 0.5px solid #333;
  }
  td {
    padding: 7px 12px;
    border-bottom: 0.5px solid #2a2a2a;
    color: #d0d0d0;
    font-size: 12px;
  }
  .statusbar {
    padding: 5px 12px;
    background: #252525;
    border-top: 0.5px solid #333;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    font-size: 11px;
    color: #888;
  }
  .progress-wrap { flex: 1; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
  .progress-bar { height: 100%; background: #1D9E75; width: 50%; }
</style>
</head>
<body>
<div class="app-wrap">
  <div class="app">
    <div class="toolbar">
      <button class="btn btn-primary">+ Adicionar arquivos</button>
      <button class="btn">Adicionar URL</button>
      <div class="toolbar-sep"></div>
      <button class="btn">Remover</button>
      <div class="toolbar-right">
        <span class="count-label">2 de 4 concluídos</span>
        <button class="zip-btn">Baixar ZIP</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>☐</th><th>Arquivo</th><th>Modelo</th><th>Status</th><th>Tarefa</th>
            <th>Exportar</th><th>Concluído em</th><th>Adicionado em</th><th>Notas</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>☑</td><td>CASTING_EP1.wav</td><td>OpenAI Whisper</td><td>Concluído</td><td>Transcrever</td><td>SRT</td><td>—</td><td>—</td><td></td></tr>
        </tbody>
      </table>
    </div>
    <div class="statusbar">
      <span><strong>4</strong> arquivos</span>
      <span><strong style="color:#1D9E75">2</strong> concluídos</span>
      <span><strong style="color:#BA7517">1</strong> processando</span>
      <span><strong>1</strong> aguardando</span>
      <div class="progress-wrap"><div class="progress-bar"></div></div>
      <span>2 / 4</span>
    </div>
  </div>
</div>
<p style="margin-top:16px;text-align:center;color:#666;font-size:11px;">
  Referência estática. A implementação real está em <code>web/app/gerar/page.tsx</code>.
</p>
</body>
</html>
